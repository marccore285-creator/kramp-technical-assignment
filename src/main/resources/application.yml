server:
  port: 8080

spring:
  application:
    name: product-info-aggregator

# gRPC server port (separate from HTTP)
grpc:
  server:
    port: 9090
    address: '*'

# Per-service timeout (ms) and failure-rate for mock simulations
aggregator:
  timeouts:
    catalog: 500
    pricing: 400
    availability: 400
    customer: 300
  failure-rates:
    catalog: 0.001 # 0.1%
    pricing: 0.005 # 0.5%
    availability: 0.02 # 2%
    customer: 0.01 # 1%

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.kramp.aggregator: INFO
